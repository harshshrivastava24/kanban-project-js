<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <nav>
            <div class="left">Kanban</div>
            <div class="right">Add new Task</div>
        </nav>
        <section>
            <div class="task-column">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count</div>
                </div>
                <div draggable="true" class="task">
                    <h2>Task Name</h2>
                    <p>Description of task</p>
                    <button type="button" class="delete">Delete</button>
                </div>
            </div>
            <div class="task-column">
                <div class="heading">
                    <div class="left">In progress</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div class="task-column">
                <div class="heading">
                    <div class="left">Completed</div>
                    <div class="right">Count</div>
                </div>
            </div>
        </section>
    </main>
    <script src="./script.js"></script>
</body>
</html>
